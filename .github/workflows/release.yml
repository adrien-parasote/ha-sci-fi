name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Extract Release Notes
        run: |
          PREFIX=$(echo "${{ github.ref_name }}" | cut -d. -f1,2)
          awk -v tag="${{ github.ref_name }}" -v prefix="^# \\\[$PREFIX\\\\." '
            $0 ~ "^# \\[" tag "\\]" {flag=1; next}
            /^# \[/ {
              if (flag && $0 !~ prefix) exit
            }
            flag
          ' CHANGELOG.md > release_notes.md

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          wget https://raw.githubusercontent.com/adrien-parasote/ha-sci-fi-wiki/master/Release-plan.md -O release-plan.md || true
          TITLE=$(python3 -c "
          import sys, re
          try:
              ref = sys.argv[1]
              major_minor = '.'.join(ref.split('.')[:2])
              with open('release-plan.md', 'r') as f:
                  for line in f.read().splitlines():
                      if f'\`{major_minor}\`' in line and '- [' in line:
                          match = re.search(r'- \[[x ]\] \`([^\`]+)\`', line)
                          if match:
                              name = match.group(1).strip()
                              emojis = ''.join(c for c in line.split(' - ')[-1] if ord(c) > 127).strip()
                              print(f'{name} {emojis}'.strip())
                              sys.exit(0)
          except Exception:
              pass
          print(f'Release {sys.argv[1]}')
          " "${{ github.ref_name }}")
          
          gh release create ${{ github.ref_name }} \
            dist/sci-fi.min.js \
            --title "$TITLE" \
            --notes-file release_notes.md
